Ahora en Railway en el servicio **videogames-api** → **Variables**, añade esta variable nueva:

- Nombre: `SPRING_DATASOURCE_URL`
- Valor: `jdbc:postgresql://` + el host y puerto de tu PostgreSQL

Para obtener el valor correcto, ve al servicio **PostgreSQL** → **Variables** y busca `PGHOST` y `PGPORT` y `PGDATABASE`. El valor quedaría así:
```
jdbc:postgresql://PGHOST:PGPORT/PGDATABASE